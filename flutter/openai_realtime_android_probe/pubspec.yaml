# openai_realtime_android_probe — Minimal Android probe app.
#
# Purpose: prove that OpenAI Realtime voice chat works flawlessly on
# Android (Z Fold 5 reference device) over a direct WebRTC peer
# connection, with mic + speaker + AEC handled entirely by libwebrtc
# (flutter_webrtc). No avatar, no bithuman plugin, no per-platform
# audio glue. Once this app is solid, the architecture migrates into
# the main bithuman_avatar plugin.
name: openai_realtime_android_probe
description: "Minimal probe: OpenAI Realtime over WebRTC on Android, no avatar, no plugins beyond flutter_webrtc."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # libwebrtc binding. On Android, libwebrtc engages the platform's
  # AcousticEchoCanceler / NoiseSuppressor / AutomaticGainControl
  # audio effects via WebRtcAudio JNI. Same stack Chrome/Meet/Discord
  # ship on Android.
  flutter_webrtc: ^1.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
