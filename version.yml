# Single source of truth for the bitHuman SDK version the native
# Expression reference apps under `expression/` depend on. Bump this
# whenever a new bithuman-sdk-public release is published, then update
# the same version string in:
#
#   - expression/mac/Package.swift     (`from: "X.Y.Z"`)
#   - expression/ipad/App/project.yml  (`from: X.Y.Z`)
#
# CI workflow `.github/workflows/sdk-version-consistency.yml` reads
# this file and fails any PR where one of the consumers disagrees.
#
# Scope: this pin only governs the native Expression apps under
# `expression/`. The Flutter `bithuman` plugin pulls its runtime via
# `scripts/bootstrap.sh` (iOS + macOS) and Maven Central (Android),
# on a different version track entirely.

bithuman-sdk-public:
  version: "0.8.1"
  release: https://github.com/bithuman-product/bithuman-sdk-public/releases/tag/v0.8.1
